<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPONSORACB | Official Licenses & Certifications</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap');

        :root {
            --gold: #d4af37;
            --dark: #0a0a0a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            color: #e0e0e0;
            min-height: 100vh;
        }

        .header {
            height: 88vh;
            background: linear-gradient(rgba(10,10,10,0.75), rgba(10,10,10,0.88)), 
                        url('https://cdn.imgurl.ir/uploads/x904941_6b55290a-5656-4f60-b1d0-a4729287141e_removalai_preview.png') center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
        }

        .header-content h1 {
            font-family: 'Playfair Display', serif;
            font-size: 5.5rem;
            color: var(--gold);
            text-shadow: 0 0 60px rgba(212, 175, 55, 0.7);
        }

        .licenses-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(430px, 1fr));
            gap: 45px;
            padding: 110px 5%;
            max-width: 1650px;
            margin: 0 auto;
        }

        .license-card {
            background: #111111;
            border-radius: 26px;
            overflow: hidden;
            border: 1px solid rgba(212, 175, 55, 0.18);
            transition: all 0.5s ease;
            cursor: pointer;
        }

        .license-card:hover {
            transform: translateY(-25px);
            box-shadow: 0 35px 80px rgba(212, 175, 55, 0.22);
        }

        .license-image {
            width: 100%;
            height: 460px;
            object-fit: contain;
            background: #0a0a0a;
            padding: 30px;
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-content">
            <h1>SPONSORACB</h1>
            <p style="font-size: 1.7rem; margin-top: 25px; color: #ddd;">Official Licenses & Trust Symbols</p>
            <p style="margin-top: 15px; font-size: 1.2rem;">Issued to: <strong>alirezat7sds</strong></p>
        </div>
    </header>

    <div class="licenses-grid" id="grid"></div>

    <!-- Modal -->
    <div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.96); z-index:1000; align-items:center; justify-content:center;">
        <div style="background:#111; padding:40px; border-radius:20px; max-width:820px; width:92%; border:2px solid #d4af37; position:relative;">
            <span onclick="closeModal()" style="position:absolute; top:15px; right:25px; font-size:2.8rem; color:#d4af37; cursor:pointer;">×</span>
            <img id="modalImg" style="width:100%; border-radius:12px; max-height:75vh; object-fit:contain;">
        </div>
    </div>

    <script>
        const licenses = [
            { img: "https://cdn.imgurl.ir/uploads/c178766_e4dad337-63ad-4862-ad54-deb0ceeb821a_removalai_preview.png", title: "Premium Business License", year: "2022", expiry: "2042", rating: 9.8 },
            { img: "https://cdn.imgurl.ir/uploads/a64307_159f72bb-e528-40f9-a12e-007744bee144_removalai_preview.png", title: "International Trade Certificate", year: "2023", expiry: "2043", rating: 10 },
            { img: "https://cdn.imgurl.ir/uploads/f31686_e703dfaf-f688-4b01-abe9-f94daa1eb08b_removalai_preview.png", title: "E-Commerce Trust Symbol", year: "2024", expiry: "2044", rating: 9.5 },
            { img: "https://cdn.imgurl.ir/uploads/v1758_98157cee-b5f6-4479-a8e6-3d45550e47f1_removalai_preview.png", title: "Financial Services License", year: "2023", expiry: "2043", rating: 8.7 },
            { img: "https://cdn.imgurl.ir/uploads/p374384_a77d0ff8-8cbf-44e8-8989-7f449eb7e288_removalai_preview.png", title: "Digital Operations Permit", year: "2025", expiry: "2045", rating: 9.9 },
            { img: "https://cdn.imgurl.ir/uploads/h469097_0ddee2e6-5c3a-4c87-8f06-3325ddd2bd13_removalai_preview.png", title: "Corporate Excellence Award", year: "2024", expiry: "2044", rating: 10 },
            { img: "https://cdn.imgurl.ir/uploads/e3149_210c316a-7eff-4b0c-a748-9e871066bfb6_removalai_preview.png", title: "Strategic Partnership License", year: "2022", expiry: "2042", rating: 9.3 }
        ];

        const grid = document.getElementById('grid');

        licenses.forEach(lic => {
            const card = document.createElement('div');
            card.className = 'license-card';
            card.innerHTML = `
                <img src="\( {lic.img}" class="license-image" alt=" \){lic.title}" 
                     onerror="this.src='https://via.placeholder.com/800x500/1a1a1a/aaaaaa?text=License+Image'">
                <div style="padding:30px; text-align:center;">
                    <h3 style="color:#d4af37; margin-bottom:12px;">${lic.title}</h3>
                    <p style="color:#ffd700; font-size:1.4rem;">★ ${lic.rating}/10</p>
                    <p><strong>Issued to:</strong> alirezat7sds</p>
                    <p><strong>Received:</strong> ${lic.year} — <strong>Valid Until:</strong> ${lic.expiry}</p>
                </div>
            `;
            card.onclick = () => {
                document.getElementById('modalImg').src = lic.img;
                document.getElementById('modal').style.display = 'flex';
            };
            grid.appendChild(card);
        });

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }
    </script>
</body>
</html>
