<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPONSORACB | Official Registry & Certifications</title>
    
    <!-- Trust-Optimized Fonts: Playfair (Authority) & Inter (Modern Readability) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        trust: {
                            900: '#0f172a', /* Deep Slate/Navy - conveys security */
                            800: '#1e293b',
                            gold: '#d4af37', /* Subtle luxury */
                            light: '#f8fafc',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #080c16;
            color: #e2e8f0;
            background-image: radial-gradient(circle at 50% 0%, rgba(30, 41, 59, 0.5) 0%, transparent 70%);
        }

        .auth-card {
            background: linear-gradient(145deg, rgba(30, 41, 59, 0.7) 0%, rgba(15, 23, 42, 0.9) 100%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .auth-card::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.03), transparent);
            transform: skewX(-20deg);
            transition: 0.7s;
        }

        .auth-card:hover {
            transform: translateY(-8px);
            border-color: rgba(212, 175, 55, 0.3); /* Gold border on hover */
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.5), 0 0 20px rgba(212, 175, 55, 0.05);
        }

        .auth-card:hover::after {
            left: 200%;
        }

        .badge-verified {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #34d399;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #080c16; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }
    </style>
</head>
<body class="antialiased selection:bg-trust-gold selection:text-black min-h-screen">

    <!-- Official Header -->
    <header class="relative pt-20 pb-16 px-6 max-w-6xl mx-auto flex flex-col items-center text-center">
        <!-- Security Shield Icon -->
        <div class="mb-6 opacity-80">
            <svg class="w-14 h-14 text-trust-gold mx-auto" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
            </svg>
        </div>

        <h3 class="text-sm tracking-[0.3em] text-gray-400 uppercase mb-4 font-semibold">Global Registry Database</h3>
        
        <h1 class="text-5xl md:text-6xl font-serif text-white font-bold mb-6 tracking-wide drop-shadow-lg">
            SPONSORACB
        </h1>
        
        <div class="h-px w-24 bg-gradient-to-r from-transparent via-trust-gold to-transparent mb-6"></div>

        <p class="text-lg md:text-xl text-gray-400 font-light mb-10 max-w-2xl">
            Official repository of active licenses, regulatory permits, and corporate certifications issued to <strong class="text-white font-medium">alirezat7sds</strong>.
        </p>

        <!-- Official Status Banner -->
        <div class="inline-flex items-center gap-3 bg-white/5 border border-white/10 px-6 py-3 rounded-full backdrop-blur-md">
            <span class="relative flex h-3 w-3">
                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                <span class="relative inline-flex rounded-full h-3 w-3 bg-green-500"></span>
            </span>
            <span class="text-sm font-medium tracking-wide text-gray-200">System Status: Secure & Verified</span>
            <span class="text-gray-500 mx-2">|</span>
            <span class="text-sm font-mono text-gray-400" id="currentDate"></span>
        </div>
    </header>

    <!-- Licenses Grid -->
    <main class="max-w-7xl mx-auto px-6 pb-24">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="grid">
            <!-- Cards will be injected here -->
        </div>
    </main>

    <!-- Professional Modal -->
    <div id="modal" class="fixed inset-0 z-50 hidden flex-col items-center justify-center p-6 bg-trust-900/95 backdrop-blur-md opacity-0 transition-opacity duration-300">
        
        <div class="relative max-w-5xl w-full flex flex-col items-center justify-center transform translate-y-4 transition-transform duration-300" id="modal-content">
            
            <!-- Close Button -->
            <button onclick="closeModal()" class="absolute -top-12 right-0 text-gray-400 hover:text-white flex items-center gap-2 transition-colors">
                <span class="text-sm tracking-widest uppercase">Close</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>

            <!-- Image wrapper with official framing -->
            <div class="bg-white p-2 rounded-xl shadow-2xl">
                <div class="bg-gray-50 border border-gray-200 rounded-lg overflow-hidden relative">
                    <img id="modalImg" class="max-w-full max-h-[75vh] object-contain" src="" alt="Official Document">
                    
                    <!-- Watermark overlay on image -->
                    <div class="absolute bottom-4 right-4 pointer-events-none opacity-40">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c2/Black_check.svg/1024px-Black_check.svg.png" class="w-8 h-8 opacity-20" alt="">
                    </div>
                </div>
            </div>
            
            <p class="text-gray-400 mt-6 text-sm font-light tracking-wide text-center">
                This document is digitally secured. Unauthorized duplication is prohibited.
            </p>
        </div>
    </div>

    <!-- Scripts -->
    <script>
        // Set formatted date
        const options = { year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('en-US', options);

        const licenses = [
            { img: "https://up.20script.ir/file/66d3-e4dad337-63ad-4862-ad54-deb0ceeb821a-removalai-preview.png", title: "Premium Business License", ref: "LIC-8992-A", year: "2022", expiry: "2042", status: "Active" },
            { img: "https://up.20script.ir/file/d734-159f72bb-e528-40f9-a12e-007744bee144-removalai-preview.png", title: "International Trade Certificate", ref: "TRD-4410-X", year: "2023", expiry: "2043", status: "Active" },
            { img: "https://up.20script.ir/file/feac-e703dfaf-f688-4b01-abe9-f94daa1eb08b-removalai-preview.png", title: "E-Commerce Trust Symbol", ref: "ECT-1109-B", year: "2024", expiry: "2044", status: "Active" },
            { img: "https://up.20script.ir/file/dcf1-98157cee-b5f6-4479-a8e6-3d45550e47f1-removalai-preview.png", title: "Financial Services License", ref: "FSL-9022-C", year: "2023", expiry: "2043", status: "Active" },
            { img: "https://up.20script.ir/file/dcf1-a77d0ff8-8cbf-44e8-8989-7f449eb7e288-removalai-preview.png", title: "Digital Operations Permit", ref: "DOP-5514-D", year: "2025", expiry: "2045", status: "Active" },
            { img: "https://up.20script.ir/file/dcf1-0ddee2e6-5c3a-4c87-8f06-3325ddd2bd13-removalai-preview.png", title: "Corporate Excellence Award", ref: "CEA-2024-WIN", year: "2024", expiry: "2044", status: "Active" },
            { img: "https://up.20script.ir/file/dcf1-210c316a-7eff-4b0c-a748-9e871066bfb6-removalai-preview.png", title: "Strategic Partnership License", ref: "SPL-7731-E", year: "2022", expiry: "2042", status: "Active" }
        ];

        const grid = document.getElementById('grid');

        // Render Professional Cards
        licenses.forEach((lic, index) => {
            const card = document.createElement('div');
            card.className = `auth-card rounded-2xl p-6 cursor-pointer flex flex-col group`;
            
            // Fade in animation with delay
            card.style.opacity = '0';
            card.style.animation = `fadeInUp 0.6s ease-out ${0.2 + (index * 0.1)}s forwards`;
            
            card.innerHTML = `
                <div class="flex justify-between items-start mb-6 border-b border-white/5 pb-4">
                    <div class="badge-verified px-2.5 py-1 rounded text-xs font-semibold uppercase tracking-wider flex items-center gap-1.5">
                        <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                        </svg>
                        ${lic.status}
                    </div>
                    <span class="text-xs text-gray-500 font-mono">REF: ${lic.ref}</span>
                </div>

                <div class="relative w-full h-56 bg-trust-800/50 rounded-xl mb-6 flex items-center justify-center p-4">
                    <img src="${lic.img}" class="w-full h-full object-contain relative z-10 transition-transform duration-500 group-hover:scale-105 drop-shadow-xl" alt="${lic.title}">
                </div>
                
                <div class="flex-grow flex flex-col">
                    <h3 class="text-xl font-serif text-white font-semibold mb-2 group-hover:text-trust-gold transition-colors">${lic.title}</h3>
                    
                    <div class="mt-auto grid grid-cols-2 gap-4 pt-4 border-t border-white/5">
                        <div>
                            <p class="text-gray-500 text-[10px] uppercase tracking-wider mb-1">Date of Issue</p>
                            <p class="text-gray-300 font-medium text-sm">${lic.year}</p>
                        </div>
                        <div>
                            <p class="text-gray-500 text-[10px] uppercase tracking-wider mb-1">Valid Thru</p>
                            <p class="text-gray-300 font-medium text-sm">${lic.expiry}</p>
                        </div>
                    </div>
                </div>
            `;
            
            card.onclick = () => openModal(lic.img);
            grid.appendChild(card);
        });

        // Add Keyframe animation to document
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes fadeInUp {
                from { opacity: 0; transform: translateY(20px); }
                to { opacity: 1; transform: translateY(0); }
            }
        `;
        document.head.appendChild(style);

        // Modal Logic
        const modal = document.getElementById('modal');
        const modalImg = document.getElementById('modalImg');
        const modalContent = document.getElementById('modal-content');

        function openModal(imgSrc) {
            modalImg.src = imgSrc;
            modal.classList.remove('hidden');
            
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('translate-y-4');
                modalContent.classList.add('translate-y-0');
            }, 10);
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modal.classList.add('opacity-0');
            modalContent.classList.remove('translate-y-0');
            modalContent.classList.add('translate-y-4');
            
            setTimeout(() => {
                modal.classList.add('hidden');
                modalImg.src = ''; 
                document.body.style.overflow = 'auto'; 
            }, 300); 
        }

        modal.addEventListener('click', function(e) {
            if (e.target === modal) {
                closeModal();
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && !modal.classList.contains('hidden')) {
                closeModal();
            }
        });
    </script>
</body>
</html>
