        // Modal Logic
        const modal = document.getElementById('modal');

        const modalContent = document.getElementById('modal-content');

        function openModal(imgSrc) {
            modalImg.src = imgSrc;
            
            modalImg.onerror = function() {

            setTimeout(() => {
                modal.classList.add('hidden');
